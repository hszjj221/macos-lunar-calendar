name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: |
          mkdir -p CalendarApp.app/Contents/MacOS
          mkdir -p CalendarApp.app/Contents/Resources
          cp .build/release/CalendarApp CalendarApp.app/Contents/MacOS/
          cp Sources/CalendarApp/Resources/Info.plist CalendarApp.app/Contents/

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - CalendarApp.app

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R CalendarApp.app dmg-staging/
          hdiutil create \
            -volname "CalendarApp" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            -o CalendarApp-${{ github.ref_name }}-macOS.dmg

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: CalendarApp-${{ github.ref_name }}-macOS.dmg
